<!-- World Cup 2026 Prediction League -->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:ital,wght@0,400;0,600;0,800;1,600&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#070b18; --ink2:#0d1426; --card:#121b33; --card2:#16203c;
    --line:rgba(255,255,255,.09); --line2:rgba(255,255,255,.16);
    --txt:#eaf0ff; --mut:#8a96b8;
    --green:#00e06a; --gold:#ffcb2b; --pink:#ff2d78; --cyan:#19e0ff; --red:#ff5470;
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Archivo',system-ui,sans-serif;color:var(--txt);
    background:
      radial-gradient(900px 500px at 85% -10%, rgba(255,45,120,.18), transparent 60%),
      radial-gradient(800px 500px at 0% 0%, rgba(25,224,255,.14), transparent 55%),
      radial-gradient(900px 700px at 50% 120%, rgba(0,224,106,.12), transparent 60%),
      var(--ink);
    min-height:100vh; -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 14px 120px}
  .anton{font-family:'Anton',sans-serif;font-weight:400;letter-spacing:.5px}

  /* header */
  header{position:sticky;top:0;z-index:30;padding:14px 0 10px;
    background:linear-gradient(var(--ink) 70%, transparent);backdrop-filter:blur(2px)}
  .hd-row{display:flex;align-items:center;gap:10px}
  .badge{width:42px;height:42px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:22px;
    background:conic-gradient(from 200deg,var(--pink),var(--gold),var(--green),var(--cyan),var(--pink));
    box-shadow:0 6px 20px rgba(0,0,0,.45)}
  .ttl{line-height:.92}
  .ttl b{font-family:'Anton',sans-serif;font-size:23px;letter-spacing:.5px;display:block}
  .ttl span{font-size:11px;color:var(--mut);letter-spacing:2px;text-transform:uppercase}
  .who{margin-left:auto;text-align:right;font-size:12px;color:var(--mut)}
  .who b{display:block;color:var(--txt);font-size:14px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .who u{cursor:pointer;color:var(--cyan);text-decoration:none;font-size:11px;border-bottom:1px dashed var(--cyan)}

  .deadline{margin-top:10px;display:flex;align-items:center;gap:8px;font-size:12.5px;
    background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 12px}
  .deadline .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green)}
  .deadline.locked .dot{background:var(--red);box-shadow:0 0 10px var(--red)}
  .deadline b{color:var(--gold)}

  /* generic */
  .muted{color:var(--mut)}
  .btn{font-family:'Archivo';font-weight:800;border:none;border-radius:13px;padding:14px;font-size:15px;
    cursor:pointer;width:100%;color:#06210f;background:var(--green);letter-spacing:.3px}
  .btn:active{transform:translateY(1px)}
  .btn[disabled]{opacity:.4;cursor:not-allowed}
  .btn.ghost{background:var(--card2);color:var(--txt);border:1px solid var(--line2)}
  .btn.gold{background:var(--gold);color:#2a1f00}

  /* name picker */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin-top:14px}
  .panel h2{font-family:'Anton';font-size:20px;margin:0 0 4px;letter-spacing:.5px}
  .panel p{margin:0 0 14px;color:var(--mut);font-size:13px;line-height:1.5}
  .names{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .name-btn{position:relative;text-align:left;background:var(--card2);border:1px solid var(--line);color:var(--txt);
    border-radius:13px;padding:13px 12px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px}
  .name-btn:active{transform:translateY(1px)}
  .name-btn .ini{width:26px;height:26px;border-radius:8px;flex:none;display:grid;place-items:center;font-size:12px;font-weight:800;
    background:linear-gradient(135deg,var(--cyan),var(--green));color:#04211a}
  .name-btn.done{border-color:rgba(0,224,106,.5)}
  .name-btn .tick{position:absolute;top:7px;right:9px;font-size:11px;color:var(--green)}

  /* pin */
  .pinrow{display:flex;gap:10px;justify-content:center;margin:6px 0 16px}
  .pinrow input{width:50px;height:60px;text-align:center;font-size:26px;font-family:'Anton';
    background:var(--card2);border:1px solid var(--line2);border-radius:14px;color:var(--txt)}
  .pinrow input:focus{outline:none;border-color:var(--cyan)}
  .err{color:var(--red);font-size:13px;text-align:center;min-height:18px;margin-bottom:6px}

  /* match cards */
  .day{font-family:'Anton';font-size:13px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;
    margin:22px 4px 9px;display:flex;align-items:center;gap:10px}
  .day::after{content:"";flex:1;height:1px;background:var(--line)}
  .m{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:11px 12px;margin-bottom:10px}
  .m .meta{display:flex;justify-content:space-between;font-size:10.5px;color:var(--mut);letter-spacing:.4px;margin-bottom:9px}
  .m .grp{color:var(--cyan);font-weight:700}
  .row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px}
  .team{display:flex;align-items:center;gap:7px;min-width:0}
  .team.away{justify-content:flex-end;text-align:right;flex-direction:row-reverse}
  .team .fl{font-size:23px;line-height:1;flex:none}
  .team .nm{font-size:13.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .score{display:flex;align-items:center;gap:6px;justify-content:center}
  .stp{display:flex;flex-direction:column;align-items:center;gap:3px}
  .stp button{width:30px;height:26px;border:none;border-radius:8px;background:var(--card2);color:var(--txt);
    font-size:16px;font-weight:800;cursor:pointer;display:grid;place-items:center;line-height:1;border:1px solid var(--line)}
  .stp button:active{transform:scale(.92)}
  .stp .val{font-family:'Anton';font-size:24px;width:34px;text-align:center;
    background:var(--ink2);border-radius:9px;padding:3px 0;border:1px solid var(--line2)}
  .vs{font-size:11px;color:var(--mut);font-weight:800}
  .m.locked .stp button{display:none}
  .m.scored{border-color:var(--line2)}
  .pts{margin-top:9px;display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--mut)}
  .pts .pill{font-weight:800;padding:2px 9px;border-radius:20px;font-size:11px}
  .pill.p3{background:rgba(0,224,106,.16);color:var(--green)}
  .pill.p1{background:rgba(255,203,43,.16);color:var(--gold)}
  .pill.p0{background:rgba(255,84,112,.15);color:var(--red)}
  .pill.res{background:var(--ink2);color:var(--txt);border:1px solid var(--line)}

  /* sticky save */
  .savebar{position:fixed;left:0;right:0;bottom:calc(60px + var(--safe-b));z-index:40;
    padding:10px 14px;max-width:560px;margin:0 auto;
    background:linear-gradient(transparent,var(--ink) 35%)}
  .savebar .inner{display:flex;gap:10px;align-items:center}
  .prog{display:flex;align-items:center;gap:10px;margin-bottom:9px;padding:0 2px}
  .prog-track{flex:1;height:8px;border-radius:20px;background:var(--card2);border:1px solid var(--line);overflow:hidden}
  .prog-fill{height:100%;width:0;border-radius:20px;background:linear-gradient(90deg,var(--cyan),var(--green));transition:width .25s}
  .prog-txt{font-family:'Anton';font-size:13px;color:var(--txt);letter-spacing:.5px;flex:none;min-width:54px;text-align:right}

  .pk{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:11px 12px;margin-bottom:10px}
  .pk .top{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .pk .top .fl{font-size:18px}
  .pk .top .nm{font-size:13px;font-weight:700}
  .pk .top .sc{margin-left:auto;font-family:'Anton';font-size:18px;color:var(--txt);background:var(--ink2);
    border:1px solid var(--line2);border-radius:9px;padding:2px 10px}
  .pk .top .sc.tbd{color:var(--mut);font-size:11px;font-family:'Archivo';font-weight:700;background:none;border:none;padding:0}
  .pk .top .grp{font-size:10px;color:var(--cyan);font-weight:800;letter-spacing:.5px}
  .plist{display:flex;flex-direction:column;gap:5px}
  .pr{display:flex;align-items:center;gap:8px;font-size:13px;padding:4px 0;border-top:1px solid var(--line)}
  .pr .pn{flex:1;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pr .pv{font-family:'Anton';font-size:15px;color:var(--mut);min-width:42px;text-align:center}
  .pr .pp{font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;min-width:30px;text-align:center}
  .pr .miss{color:var(--mut);font-style:italic;font-size:12px}
  .saved-flash{position:fixed;left:50%;top:80px;transform:translateX(-50%);z-index:60;
    background:var(--green);color:#06210f;font-weight:800;padding:11px 20px;border-radius:30px;
    box-shadow:0 8px 24px rgba(0,224,106,.4);opacity:0;transition:.25s;pointer-events:none;font-size:14px}
  .saved-flash.show{opacity:1;top:96px}

  /* leaderboard */
  .lb-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:9px;
    display:flex;align-items:center;gap:12px}
  .lb-card .rk{font-family:'Anton';font-size:22px;width:34px;text-align:center;color:var(--mut)}
  .lb-card.r1 .rk{color:var(--gold)} .lb-card.r2 .rk{color:#cfd6e6} .lb-card.r3 .rk{color:#e0863b}
  .lb-card.r1{border-color:rgba(255,203,43,.5);background:linear-gradient(180deg,rgba(255,203,43,.08),var(--card))}
  .lb-card .nm{font-weight:700;font-size:15px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lb-card .sub{font-size:11px;color:var(--mut);font-weight:400}
  .lb-card .tot{font-family:'Anton';font-size:26px;color:var(--green)}
  .lb-card .tot small{font-family:'Archivo';font-size:10px;color:var(--mut);display:block;text-align:right;font-weight:600}

  /* results entry */
  .r-note{font-size:12px;color:var(--mut);background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:10px 12px;margin-top:12px;line-height:1.5}

  /* bottom nav */
  nav{position:fixed;left:0;right:0;bottom:0;z-index:50;height:calc(60px + var(--safe-b));
    padding-bottom:var(--safe-b);background:rgba(8,12,24,.92);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);display:flex;max-width:560px;margin:0 auto}
  nav button{flex:1;background:none;border:none;color:var(--mut);font-family:'Archivo';font-weight:700;
    font-size:10.5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding-top:8px}
  nav button .ic{font-size:19px;line-height:1}
  nav button.on{color:var(--green)}

  .empty{text-align:center;color:var(--mut);padding:40px 20px;font-size:14px}
  .syncwarn{font-size:11px;color:var(--gold);background:rgba(255,203,43,.1);border:1px solid rgba(255,203,43,.3);
    border-radius:10px;padding:8px 10px;margin-top:10px;display:none}
  .hide{display:none!important}
  .filterbar{display:flex;gap:6px;overflow-x:auto;padding:4px 0 2px;margin-top:8px;-webkit-overflow-scrolling:touch}
  .filterbar button{flex:none;background:var(--card2);border:1px solid var(--line);color:var(--mut);
    border-radius:20px;padding:6px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Archivo'}
  .filterbar button.on{background:var(--cyan);color:#042029;border-color:var(--cyan)}
</style>

<div class="wrap">
  <header>
    <div class="hd-row">
      <div class="badge">🏆</div>
      <div class="ttl"><b>PREDICTOR '26</b><span>World Cup &middot; Group Stage</span></div>
      <div class="who" id="whoBox"></div>
    </div>
    <div class="deadline" id="deadline"></div>
    <div class="syncwarn" id="syncwarn">⚠️ Backend not connected yet — nothing will save. Paste your Firebase config into the top of this file's code (setup steps are in the comment there).</div>

</div>

</nav>

async function initStore(){
  if(!CONFIGURED) return false;
  try{
    const app=initializeApp(FIREBASE_CONFIG);

    await new Promise((res)=>{
      let first=true;
      onSnapshot(collection(db,"kv"), s=>{
        for(const k in cache) delete cache[k];

 ["m66","G","Sat 27 Jun","4:00am","Egypt","Iran"],
 ["m67","L","Sat 27 Jun","10:00pm","Panama","England"],
 ["m68","L","Sat 27 Jun","10:00pm","Croatia","Ghana"],
 ["m69","K","Sun 28 Jun","12:30am","Colombia","Portugal"],
 ["m70","K","Sun 28 Jun","12:30am","DR Congo","Uzbekistan"],
 ["m71","J","Sun 28 Jun","3:00am","Algeria","Austria"],
 ["m72","J","Sun 28 Jun","3:00am","Jordan","Argentina"],
];
const MATCHES = RAW.map(r=>({id:r[0],grp:r[1],day:r[2],time:r[3],h:r[4],a:r[5],hf:F[r[4]]||"🏳️",af:F[r[5]]||"🏳️"}));

// edit allowed up to end of 10 June 2026 (UK)
const LOCK = new Date("2026-06-10T23:59:59+01:00").getTime();
const isLocked = ()=> Date.now() > LOCK;

/* ---------------- STORAGE (Firestore-backed, live cache) ---------------- */
function slug(n){return "wc26:pred:"+n.replace(/[^a-z0-9]/gi,"").toLowerCase();}
async function sGet(k){return cache[k]!==undefined?cache[k]:null;}
async function sSet(k,v){
  cache[k]=v;                                  // optimistic local update
  if(db){try{await setDoc(doc(db,"kv",safeKey(k)),{k,v});}catch(e){console.error(e);}}
}
async function sList(prefix){return Object.keys(cache).filter(k=>k.startsWith(prefix));}
function hash(p){let h=0;for(const c of (p||"")){h=(h*31+c.charCodeAt(0))>>>0;}return "h"+h;}

/* ---------------- STATE ---------------- */
const ADMIN="Luke Craven";   // only this player's PIN can edit results
let resultsUnlocked=false;   // session flag once admin PIN entered
let tab="predict";
let player=null;          // current player name
let picks={};             // {matchId:{h,a}}
let results={};           // {matchId:{h,a}}
let groupFilter="ALL";

const el=id=>document.getElementById(id);
const view=el("view");

/* ---------------- HELPERS ---------------- */
function outcome(h,a){return h>a?1:(h<a?2:0);} // 1 home,2 away,0 draw
function scoreFor(pred,res){
  if(!pred||!res)return null;
  if(pred.h===res.h&&pred.a===res.a)return 3;
  if(outcome(pred.h,pred.a)===outcome(res.h,res.a))return 1;
  return 0;
}
function initials(n){return n.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();}
function flash(t){const f=el("flash");f.textContent=t;f.classList.add("show");setTimeout(()=>f.classList.remove("show"),1500);}
function updateProgress(){
  const done=Object.keys(picks).length, total=MATCHES.length;
  const fill=el("progFill"), txt=el("progTxt");
  if(fill)fill.style.width=(done/total*100)+"%";
  if(txt)txt.textContent=done+" / "+total;
}

/* ---------------- RENDER: header bits ---------------- */
function renderHeader(){
  const dl=el("deadline");
  const locked=isLocked();
  dl.className="deadline"+(locked?" locked":"");
  if(locked){
    dl.innerHTML='<span class="dot"></span><span>Predictions <b>LOCKED</b> — deadline was 10 June. View only.</span>';
  }else{
    const d=Math.ceil((LOCK-Date.now())/86400000);
    dl.innerHTML='<span class="dot"></span><span>Edit your picks until <b>10 June</b> · '+d+' day'+(d===1?'':'s')+' left</span>';
  }
  const wb=el("whoBox");
  if(player){
    wb.innerHTML='Playing as<b>'+player+'</b><u id="chg">change</u>';
    el("chg").onclick=goNames;
  }else wb.innerHTML='';
  el("syncwarn").style.display=CONFIGURED?"none":"block";
}

/* ---------------- VIEW: name picker ---------------- */
async function goNames(){
  player=null;picks={};tab="predict";
  el("savebar").classList.add("hide");
  setNav();renderHeader();
  view.innerHTML='<div class="panel"><h2>Who are you?</h2><p>Pick your name, set a 4-digit PIN, then make your predictions. Your PIN stops anyone else editing your picks.</p><div class="names" id="names"></div></div>';
  const done = await whoHasSaved();
  const box=el("names");
  PLAYERS.forEach(n=>{
    const b=document.createElement("button");
    b.className="name-btn"+(done.has(n)?" done":"");
    b.innerHTML='<span class="ini">'+initials(n)+'</span>'+n+(done.has(n)?'<span class="tick">✓ in</span>':'');
    b.onclick=()=>pickName(n);
    box.appendChild(b);
  });
}
async function whoHasSaved(){
  const keys=await sList("wc26:pred:");
  const set=new Set();
  for(const n of PLAYERS){if(keys.includes(slug(n)))set.add(n);}
  return set;
}

async function pickName(n){
  const raw=await sGet(slug(n));
  const data=raw?JSON.parse(raw):null;
  if(data && data.pin){ promptPin(n,data); }
  else { setupPin(n); }
}

function promptPin(n,data){
  view.innerHTML='<div class="panel"><h2>Hi '+n.split(" ")[0]+' 👋</h2><p>Enter your 4-digit PIN to edit your predictions.</p>'
    +'<div class="pinrow" id="pinrow"></div><div class="err" id="pinerr"></div>'
    +'<button class="btn" id="pinok">Unlock</button>'
    +'<button class="btn ghost" id="pinback" style="margin-top:9px">Back</button></div>';
  buildPinInputs();
  el("pinback").onclick=goNames;
  el("pinok").onclick=()=>{
    const p=readPin();
    if(p.length<4){el("pinerr").textContent="Enter all 4 digits";return;}
    if(hash(p)!==data.pin){el("pinerr").textContent="Wrong PIN, try again";return;}
    player=n;picks=data.picks||{};enterPredict();
  };
}
function setupPin(n){
  view.innerHTML='<div class="panel"><h2>Welcome, '+n.split(" ")[0]+'!</h2><p>Choose a 4-digit PIN. You\'ll need it to edit your picks later, so keep it safe.</p>'
    +'<div class="pinrow" id="pinrow"></div><div class="err" id="pinerr"></div>'
    +'<button class="btn gold" id="pinok">Set PIN & start predicting</button>'
    +'<button class="btn ghost" id="pinback" style="margin-top:9px">Back</button></div>';
  buildPinInputs();
  el("pinback").onclick=goNames;
  el("pinok").onclick=async()=>{
    const p=readPin();
    if(p.length<4){el("pinerr").textContent="Pick a 4-digit PIN";return;}
    player=n;picks={};
    await sSet(slug(n),JSON.stringify({pin:hash(p),picks:{},updated:Date.now()}));
    enterPredict();
  };
}
function buildPinInputs(){
  const r=el("pinrow");r.innerHTML="";
  for(let i=0;i<4;i++){
    const inp=document.createElement("input");
    inp.type="tel";inp.maxLength=1;inp.inputMode="numeric";inp.dataset.i=i;
    inp.oninput=e=>{e.target.value=e.target.value.replace(/\D/g,"");if(e.target.value&&i<3)r.children[i+1].focus();};
    inp.onkeydown=e=>{if(e.key==="Backspace"&&!e.target.value&&i>0)r.children[i-1].focus();};
    r.appendChild(inp);
  }
  setTimeout(()=>r.children[0].focus(),100);
}
function readPin(){return [...el("pinrow").children].map(i=>i.value).join("");}

/* ---------------- VIEW: predict ---------------- */
function enterPredict(){tab="predict";setNav();render();}

function groupsPresent(){return [...new Set(MATCHES.map(m=>m.grp))].sort();}

function renderPredict(){
  if(!player){goNames();return;}
  const locked=isLocked();
  el("savebar").classList.toggle("hide",locked);
  let h='<div class="filterbar" id="fbar"><button data-g="ALL" class="'+(groupFilter==="ALL"?"on":"")+'">All games</button>';
  groupsPresent().forEach(g=>h+='<button data-g="'+g+'" class="'+(groupFilter===g?"on":"")+'">Grp '+g+'</button>');
  h+='</div>';

  const list=MATCHES.filter(m=>groupFilter==="ALL"||m.grp===groupFilter);
  let lastDay="";
  list.forEach(m=>{
    if(m.day!==lastDay){h+='<div class="day">'+m.day+'</div>';lastDay=m.day;}
    const p=picks[m.id];const r=results[m.id];
    const hv=p?p.h:0, av=p?p.a:0;
    h+=matchCard(m,hv,av,locked,r,p);
  });
  view.innerHTML=h;

  el("fbar").querySelectorAll("button").forEach(b=>b.onclick=()=>{groupFilter=b.dataset.g;render();});
  if(!locked) wireSteppers();
  updateProgress();
}

function matchCard(m,hv,av,locked,res,pred){
  let ptsHtml="";
  if(res){
    const s=scoreFor(pred,res);
    const pill = s===3?'<span class="pill p3">+3 exact</span>':s===1?'<span class="pill p1">+1 result</span>':s===0?'<span class="pill p0">0 pts</span>':'';
    ptsHtml='<div class="pts"><span class="pill res">FT '+res.h+'–'+res.a+'</span>'+(pred?pill:'<span class="muted">no pick</span>')+'</div>';
  }
  return '<div class="m'+(locked?' locked':'')+(res?' scored':'')+'" data-id="'+m.id+'">'
    +'<div class="meta"><span class="grp">GROUP '+m.grp+'</span><span>'+m.time+' UK</span></div>'
    +'<div class="row">'
      +'<div class="team"><span class="fl">'+m.hf+'</span><span class="nm">'+m.h+'</span></div>'
      +'<div class="score">'+stepper("h",hv)+'<span class="vs">v</span>'+stepper("a",av)+'</div>'
      +'<div class="team away"><span class="fl">'+m.af+'</span><span class="nm">'+m.a+'</span></div>'
    +'</div>'+ptsHtml+'</div>';
}
function stepper(side,val){
  return '<div class="stp" data-side="'+side+'">'
    +'<button data-d="1">+</button>'
    +'<span class="val">'+val+'</span>'
    +'<button data-d="-1">−</button></div>';
}
function wireSteppers(){
  view.querySelectorAll(".m").forEach(card=>{
    const id=card.dataset.id;
    card.querySelectorAll(".stp").forEach(stp=>{
      const side=stp.dataset.side;
      stp.querySelectorAll("button").forEach(btn=>{
        btn.onclick=()=>{
          if(!picks[id])picks[id]={h:0,a:0};
          let v=picks[id][side]+(+btn.dataset.d);
          v=Math.max(0,Math.min(20,v));
          picks[id][side]=v;
          stp.querySelector(".val").textContent=v;
          updateProgress();
        };
      });
    });
  });
}

async function saveMine(){
  if(!player)return;
  const raw=await sGet(slug(player));
  const data=raw?JSON.parse(raw):{pin:null,picks:{}};
  data.picks=picks;data.updated=Date.now();
  await sSet(slug(player),JSON.stringify(data));
  flash("✓ Predictions saved");
}

/* ---------------- VIEW: leaderboard ---------------- */
async function renderTable(){
  el("savebar").classList.add("hide");
  view.innerHTML='<div class="empty">Loading standings…</div>';
  await loadResults();
  const keys=await sList("wc26:pred:");
  const rows=[];
  for(const n of PLAYERS){
    if(!keys.includes(slug(n)))continue;
    const raw=await sGet(slug(n));if(!raw)continue;
    const d=JSON.parse(raw);
    let tot=0,exact=0,correct=0,played=0;
    for(const m of MATCHES){
      const s=scoreFor(d.picks[m.id],results[m.id]);
      if(s===null)continue;
      played++;tot+=s;if(s===3)exact++;else if(s===1)correct++;
    }
    rows.push({n,tot,exact,correct,played,made:Object.keys(d.picks||{}).length});
  }
  rows.sort((a,b)=> b.tot-a.tot || b.exact-a.exact);
  const anyResults=Object.keys(results).length>0;

  if(rows.length===0){view.innerHTML='<div class="empty">No predictions submitted yet.<br>Be the first — tap <b>Predict</b>.</div>';return;}
  let h='';
  if(!anyResults){
    h+='<div class="r-note" style="margin-bottom:14px">No results entered yet, so everyone\'s on 0. The table updates automatically as match results are added in the <b>Results</b> tab. Below shows who\'s submitted picks.</div>';
  }
  let rank=0,prev=null;
  rows.forEach((r,i)=>{
    if(r.tot!==prev){rank=i+1;prev=r.tot;}
    const cls=rank<=3?" r"+rank:"";
    const medal=rank===1?"🥇":rank===2?"🥈":rank===3?"🥉":"#"+rank;
    h+='<div class="lb-card'+cls+'">'
      +'<div class="rk">'+medal+'</div>'
      +'<div class="nm">'+r.n+'<span class="sub" style="display:block">'+(anyResults?(r.exact+' exact · '+r.correct+' result · '+r.played+' scored'):(r.made+' / 72 picks made'))+'</span></div>'
      +'<div class="tot">'+r.tot+'<small>POINTS</small></div></div>';
  });
  view.innerHTML=h;
}

/* ---------------- VIEW: results entry (admin-locked) ---------------- */
async function renderResults(){
  el("savebar").classList.add("hide");
  await loadResults();
  const adminRaw=await sGet(slug(ADMIN));
  const adminRec=adminRaw?JSON.parse(adminRaw):null;
  const adminHasPin=!!(adminRec&&adminRec.pin);
  const editable = adminHasPin && (player===ADMIN || resultsUnlocked);

  // Case 1: admin hasn't set a PIN yet → results stay read-only for all
  if(!adminHasPin){
    let h='<div class="r-note">📋 Results are locked to <b>'+ADMIN+'</b>. They unlock once Luke sets his PIN — go to <b>Predict</b>, pick "'+ADMIN+'" and choose a PIN. After that, only that PIN can update scores.</div>';
    view.innerHTML=h+resultsListHtml(false);
    wireResultsFilter();
    return;
  }

  // Case 2: admin PIN exists but this session isn't unlocked → show gate
  if(!editable){
    view.innerHTML='<div class="panel"><h2>🔒 Results locked</h2>'
      +'<p>Only <b>'+ADMIN+'</b> can update match scores. Enter the admin PIN to unlock results on this device.</p>'
      +'<div class="pinrow" id="pinrow"></div><div class="err" id="pinerr"></div>'
      +'<button class="btn gold" id="resUnlock">Unlock results</button></div>'
      +'<div style="margin-top:14px" class="muted"></div>'
      +resultsListHtml(false);
    buildPinInputs();
    wireResultsFilter();
    el("resUnlock").onclick=()=>{
      const p=readPin();
      if(p.length<4){el("pinerr").textContent="Enter all 4 digits";return;}
      if(hash(p)!==adminRec.pin){el("pinerr").textContent="Wrong PIN";return;}
      resultsUnlocked=true;render();
    };
    return;
  }

  // Case 3: unlocked → editable
  let h='<div class="r-note">✓ Admin unlocked. Enter the <b>actual full-time score</b> for each game — this is shared and drives the leaderboard. Scoring: <b>3</b> exact · <b>1</b> correct result · <b>0</b> otherwise.</div>';
  view.innerHTML=h+resultsListHtml(true)
    +'<div style="margin:16px 0 4px"><button class="btn gold" id="saveRes">Save results</button></div>';
  wireResultsFilter();
  view.querySelectorAll(".m").forEach(card=>{
    const id=card.dataset.id;
    card.querySelectorAll(".stp").forEach(stp=>{
      const side=stp.dataset.side;
      stp.querySelectorAll("button").forEach(btn=>btn.onclick=()=>{
        if(!results[id])results[id]={h:0,a:0};
        let v=results[id][side]+(+btn.dataset.d);v=Math.max(0,Math.min(20,v));
        results[id][side]=v;stp.querySelector(".val").textContent=v;
      });
    });
  });
  el("saveRes").onclick=async()=>{await sSet("wc26:results",JSON.stringify(results));flash("✓ Results saved");};
}
function resultsListHtml(editable){
  let h='<div class="filterbar" id="fbar"><button data-g="ALL" class="'+(groupFilter==="ALL"?"on":"")+'">All</button>';
  groupsPresent().forEach(g=>h+='<button data-g="'+g+'" class="'+(groupFilter===g?"on":"")+'">Grp '+g+'</button>');
  h+='</div>';
  const list=MATCHES.filter(m=>groupFilter==="ALL"||m.grp===groupFilter);
  let lastDay="";
  list.forEach(m=>{
    if(m.day!==lastDay){h+='<div class="day">'+m.day+'</div>';lastDay=m.day;}
    const r=results[m.id];const hv=r?r.h:0,av=r?r.a:0;
    const sc = editable
      ? '<div class="score">'+stepper("h",hv)+'<span class="vs">v</span>'+stepper("a",av)+'</div>'
      : '<div class="score"><span class="val" style="font-family:Anton;font-size:24px;width:34px;text-align:center;background:var(--ink2);border-radius:9px;padding:3px 0;border:1px solid var(--line2)">'+(r?r.h:'–')+'</span><span class="vs">v</span><span class="val" style="font-family:Anton;font-size:24px;width:34px;text-align:center;background:var(--ink2);border-radius:9px;padding:3px 0;border:1px solid var(--line2)">'+(r?r.a:'–')+'</span></div>';
    h+='<div class="m" data-id="'+m.id+'">'
      +'<div class="meta"><span class="grp">GROUP '+m.grp+'</span><span>'+(r?'✓ result in':m.time+' UK')+'</span></div>'
      +'<div class="row">'
        +'<div class="team"><span class="fl">'+m.hf+'</span><span class="nm">'+m.h+'</span></div>'
        +sc
        +'<div class="team away"><span class="fl">'+m.af+'</span><span class="nm">'+m.a+'</span></div>'
      +'</div></div>';
  });
  return h;
}
function wireResultsFilter(){
  const fb=el("fbar");if(fb)fb.querySelectorAll("button").forEach(b=>b.onclick=()=>{groupFilter=b.dataset.g;render();});
}
async function loadResults(){const raw=await sGet("wc26:results");results=raw?JSON.parse(raw):{};}

/* ---------------- VIEW: all picks (reveals after deadline) ---------------- */
async function renderPicks(){
  el("savebar").classList.add("hide");
  if(!isLocked()){
    const d=Math.ceil((LOCK-Date.now())/86400000);
    view.innerHTML='<div class="empty">🔒<br><br>Everyone\'s predictions stay hidden until the <b>10 June</b> deadline — no peeking, no copying.<br><br>They all reveal here once the tournament kicks off ('+d+' day'+(d===1?'':'s')+' to go).</div>';
    return;
  }
  view.innerHTML='<div class="empty">Loading everyone\'s picks…</div>';
  await loadResults();
  const all=await loadAllPicks(); // [{n, picks}]
  if(all.length===0){view.innerHTML='<div class="empty">No predictions were submitted.</div>';return;}

  let h='<div class="filterbar" id="fbar"><button data-g="ALL" class="'+(groupFilter==="ALL"?"on":"")+'">All games</button>';
  groupsPresent().forEach(g=>h+='<button data-g="'+g+'" class="'+(groupFilter===g?"on":"")+'">Grp '+g+'</button>');
  h+='</div>';
  const list=MATCHES.filter(m=>groupFilter==="ALL"||m.grp===groupFilter);
  let lastDay="";
  list.forEach(m=>{
    if(m.day!==lastDay){h+='<div class="day">'+m.day+'</div>';lastDay=m.day;}
    const r=results[m.id];
    const scHtml=r?'<span class="sc">'+r.h+' – '+r.a+'</span>':'<span class="sc tbd">not played</span>';
    h+='<div class="pk"><div class="top"><span class="grp">GRP '+m.grp+'</span>'
      +'<span class="fl">'+m.hf+'</span><span class="nm">'+m.h+'</span>'
      +'<span class="muted" style="font-size:11px">v</span>'
      +'<span class="fl">'+m.af+'</span><span class="nm">'+m.a+'</span>'
      +scHtml+'</div><div class="plist">';
    all.forEach(pl=>{
      const p=pl.picks[m.id];
      if(!p){h+='<div class="pr"><span class="pn">'+pl.n+'</span><span class="miss">— no pick</span></div>';return;}
      let pp='';
      if(r){const s=scoreFor(p,r);
        pp='<span class="pp '+(s===3?'p3':s===1?'p1':'p0')+'">+'+s+'</span>';}
      h+='<div class="pr"><span class="pn">'+pl.n+'</span><span class="pv">'+p.h+'–'+p.a+'</span>'+pp+'</div>';
    });
    h+='</div></div>';
  });
  view.innerHTML=h;
  el("fbar").querySelectorAll("button").forEach(b=>b.onclick=()=>{groupFilter=b.dataset.g;render();});
}
async function loadAllPicks(){
  const keys=await sList("wc26:pred:");
  const out=[];
  for(const n of PLAYERS){
    if(!keys.includes(slug(n)))continue;
    const raw=await sGet(slug(n));if(!raw)continue;
    out.push({n,picks:JSON.parse(raw).picks||{}});
  }
  return out;
}

/* ---------------- ROUTER ---------------- */
function setNav(){document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));}
function render(){
  renderHeader();setNav();
  if(tab==="predict"){ if(!player){goNames();return;} renderPredict(); }
  else if(tab==="table"){ renderTable(); }
  else if(tab==="picks"){ renderPicks(); }
  else if(tab==="results"){ renderResults(); }
}

document.querySelectorAll("nav button").forEach(b=>{
  b.onclick=()=>{tab=b.dataset.tab;groupFilter="ALL";render();};
});
el("saveBtn").onclick=saveMine;

/* ---------------- INIT ---------------- */
(async function(){
  await initStore();
  await loadResults();
  renderHeader();
  goNames();
})();
</script>
