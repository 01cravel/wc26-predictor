<!-- World Cup 2026 Prediction League -->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:ital,wght@0,400;0,600;0,800;1,600&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#070b18; --ink2:#0d1426; --card:#121b33; --card2:#16203c;
    --line:rgba(255,255,255,.09); --line2:rgba(255,255,255,.16);
    --txt:#eaf0ff; --mut:#8a96b8;
    --green:#00e06a; --gold:#ffcb2b; --pink:#ff2d78; --cyan:#19e0ff; --red:#ff5470;
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;touch-action:manipulation}
  body{
    font-family:'Archivo',system-ui,sans-serif;color:var(--txt);
    background:
      radial-gradient(900px 500px at 85% -10%, rgba(255,45,120,.18), transparent 60%),
      radial-gradient(800px 500px at 0% 0%, rgba(25,224,255,.14), transparent 55%),
      radial-gradient(900px 700px at 50% 120%, rgba(0,224,106,.12), transparent 60%),
      var(--ink);
    min-height:100vh; -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 14px 120px}
  body.saving .wrap{padding-bottom:185px}   /* clear the fixed Save bar so it never covers the last card */
  .anton{font-family:'Anton',sans-serif;font-weight:400;letter-spacing:.5px}

  /* header */
  header{position:sticky;top:0;z-index:30;padding:14px 0 10px;
    background:linear-gradient(var(--ink) 70%, transparent);backdrop-filter:blur(2px)}
  .hd-row{display:flex;align-items:center;gap:10px}
  .badge{width:42px;height:42px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:22px;
    background:conic-gradient(from 200deg,var(--pink),var(--gold),var(--green),var(--cyan),var(--pink));
    box-shadow:0 6px 20px rgba(0,0,0,.45)}
  .ttl{line-height:.92}
  .ttl b{font-family:'Anton',sans-serif;font-size:23px;letter-spacing:.5px;display:block;margin-bottom:4px}
  .ttl span{font-size:11px;color:var(--mut);letter-spacing:2px;text-transform:uppercase}
  .who{margin-left:auto;text-align:right;font-size:12px;color:var(--mut)}
  .who b{display:block;color:var(--txt);font-size:14px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .who u{cursor:pointer;color:var(--cyan);text-decoration:none;font-size:11px;border-bottom:1px dashed var(--cyan)}

  .deadline{margin-top:10px;display:flex;align-items:center;gap:8px;font-size:12.5px;
    background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 12px}
  .deadline .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green)}
  .deadline.locked .dot{background:var(--red);box-shadow:0 0 10px var(--red)}
  .deadline b{color:var(--gold)}

  /* generic */
  .muted{color:var(--mut)}
  .btn{font-family:'Archivo';font-weight:800;border:none;border-radius:13px;padding:14px;font-size:15px;
    cursor:pointer;width:100%;color:#06210f;background:var(--green);letter-spacing:.3px}
  .btn:active{transform:translateY(1px)}
  .btn[disabled]{opacity:.4;cursor:not-allowed}
  .btn.ghost{background:var(--card2);color:var(--txt);border:1px solid var(--line2)}
  .btn.gold{background:var(--gold);color:#2a1f00}

  /* name picker */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin-top:14px}
  .panel h2{font-family:'Anton';font-size:20px;margin:0 0 4px;letter-spacing:.5px}
  .panel p{margin:0 0 14px;color:var(--mut);font-size:13px;line-height:1.5}
  .names{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .name-btn{position:relative;text-align:left;background:var(--card2);border:1px solid var(--line);color:var(--txt);
    border-radius:13px;padding:13px 12px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px}
  .name-btn:active{transform:translateY(1px)}
  .name-btn .ini{width:26px;height:26px;border-radius:8px;flex:none;display:grid;place-items:center;font-size:12px;font-weight:800;
    background:linear-gradient(135deg,var(--cyan),var(--green));color:#04211a}
  .name-btn.done{border-color:rgba(0,224,106,.5)}
  .name-btn .tick{position:absolute;top:7px;right:9px;font-size:11px;color:var(--green)}
  .name-btn .tick.paid{color:var(--gold)}

  /* pin */
  .pinrow{display:flex;gap:10px;justify-content:center;margin:6px 0 16px}
  .pinrow input{width:50px;height:60px;text-align:center;font-size:26px;font-family:'Anton';
    background:var(--card2);border:1px solid var(--line2);border-radius:14px;color:var(--txt)}
  .pinrow input:focus{outline:none;border-color:var(--cyan)}
  .err{color:var(--red);font-size:13px;text-align:center;min-height:18px;margin-bottom:6px}

  /* match cards */
  .day{font-family:'Anton';font-size:13px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;
    margin:22px 4px 9px;display:flex;align-items:center;gap:10px}
  .day::after{content:"";flex:1;height:1px;background:var(--line)}
  .m{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:11px 12px;margin-bottom:10px}
  .m .meta{display:flex;justify-content:space-between;font-size:10.5px;color:var(--mut);letter-spacing:.4px;margin-bottom:9px}
  .m .grp{color:var(--cyan);font-weight:700}
  /* one row per team: flag · name · [ − value + ] — big chunky horizontal steppers */
  .teams{display:flex;flex-direction:column;gap:9px;margin-top:2px}
  .trow{display:flex;align-items:center;gap:10px;min-height:50px}
  .trow .fl{font-size:26px;line-height:1;flex:none}
  .trow .nm{font-size:15px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .stp{display:flex;align-items:center;gap:9px;flex:none}
  .stp button{width:54px;height:50px;border:1px solid var(--line2);border-radius:13px;background:var(--card2);color:var(--txt);
    font-size:30px;font-weight:800;cursor:pointer;display:grid;place-items:center;line-height:1}
  .stp button:active{transform:scale(.9);background:var(--ink2)}
  .stp .val{font-family:'Anton';font-size:30px;width:50px;text-align:center;color:var(--txt);
    background:var(--ink2);border-radius:11px;padding:6px 0;border:1px solid var(--line2)}
  .m.scored{border-color:var(--line2)}
  .m.set{border-color:rgba(0,224,106,.4)}
  .m.set .stp .val{color:var(--green)}
  .m:not(.set):not(.scored) .stp .val{color:var(--mut)}
  .picked{color:var(--green);font-weight:800;letter-spacing:.3px}
  .nopick{color:var(--mut);font-style:italic;font-size:16px;font-weight:700;min-width:50px;text-align:center}
  .editbtn{background:var(--card2);border:1px solid var(--line2);color:var(--cyan);font-family:'Archivo';
    font-weight:800;font-size:12px;padding:6px 15px;border-radius:20px;cursor:pointer;letter-spacing:.3px}
  .editbtn:active{transform:translateY(1px)}
  .sval{font-family:'Anton';font-size:30px;min-width:50px;text-align:center;color:var(--green);padding:6px 6px}
  .m.done{border-color:rgba(0,224,106,.4)}
  .m.locked .sval,.m.scored .sval{color:var(--txt)}
  .pts{margin-top:9px;display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--mut)}
  .pts .pill{font-weight:800;padding:2px 9px;border-radius:20px;font-size:11px}
  .pill.p3{background:rgba(0,224,106,.16);color:var(--green)}
  .pill.p1{background:rgba(255,203,43,.16);color:var(--gold)}
  .pill.p0{background:rgba(255,84,112,.15);color:var(--red)}
  .pill.res{background:var(--ink2);color:var(--txt);border:1px solid var(--line)}

  /* sticky save */
  .savebar{position:fixed;left:0;right:0;bottom:calc(60px + var(--safe-b));z-index:40;
    padding:10px 14px;max-width:560px;margin:0 auto;
    background:linear-gradient(transparent,var(--ink) 35%)}
  .savebar .inner{display:flex;gap:10px;align-items:center}
  .savebar #nextBtn{flex:none;width:auto;padding-left:18px;padding-right:18px}
  .savebar #saveBtn{flex:1}
  .m.flashcard{animation:flashcard 1.2s ease}
  @keyframes flashcard{0%,100%{box-shadow:none}45%{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(25,224,255,.45)}}
  .prog{display:flex;align-items:center;gap:10px;margin-bottom:9px;padding:0 2px}
  .prog-track{flex:1;height:8px;border-radius:20px;background:var(--card2);border:1px solid var(--line);overflow:hidden}
  .prog-fill{height:100%;width:0;border-radius:20px;background:linear-gradient(90deg,var(--cyan),var(--green));transition:width .25s}
  .prog-txt{font-family:'Anton';font-size:13px;color:var(--txt);letter-spacing:.5px;flex:none;min-width:54px;text-align:right}

  .pk,.propreveal{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:11px 12px;margin-bottom:10px}
  .pk .top,.propreveal .top{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .pk .top .fl,.propreveal .top .fl{font-size:18px}
  .pk .top .nm,.propreveal .top .nm{font-size:13px;font-weight:700}
  .pk .top .sc,.propreveal .top .sc{margin-left:auto;font-family:'Anton';font-size:18px;color:var(--txt);background:var(--ink2);
    border:1px solid var(--line2);border-radius:9px;padding:2px 10px}
  .pk .top .sc.tbd,.propreveal .top .sc.tbd{color:var(--mut);font-size:11px;font-family:'Archivo';font-weight:700;background:none;border:none;padding:0}
  .pk .top .grp,.propreveal .top .grp{font-size:10px;color:var(--cyan);font-weight:800;letter-spacing:.5px}
  .plist{display:flex;flex-direction:column;gap:5px}
  .pr{display:flex;align-items:center;gap:8px;font-size:13px;padding:4px 0;border-top:1px solid var(--line)}
  .pr .pn{flex:1;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pr .pv{font-family:'Anton';font-size:15px;color:var(--mut);min-width:42px;text-align:center}
  .pr .pp{font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;min-width:30px;text-align:center}
  .pr .miss{color:var(--mut);font-style:italic;font-size:12px}
  .crowd{font-size:11.5px;color:var(--gold);font-weight:700;padding:5px 0 3px;letter-spacing:.2px}
  .crowd b{font-family:'Anton';color:var(--txt);font-size:14px;letter-spacing:.5px;margin:0 2px}
  .saved-flash{position:fixed;left:50%;top:80px;transform:translateX(-50%);z-index:60;
    background:var(--green);color:#06210f;font-weight:800;padding:11px 20px;border-radius:30px;
    box-shadow:0 8px 24px rgba(0,224,106,.4);opacity:0;transition:.25s;pointer-events:none;font-size:14px}
  .saved-flash.show{opacity:1;top:96px}

  /* modal pop-up */
  .modal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:24px;
    background:rgba(4,7,16,.72);backdrop-filter:blur(3px)}
  .modal.show{display:flex}
  .modal-card{background:var(--card);border:1px solid var(--line2);border-radius:20px;padding:26px 22px 22px;
    max-width:380px;width:100%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.55);animation:modalpop .22s ease}
  .modal-card .ico{font-size:42px;line-height:1;margin-bottom:8px}
  .modal-card h3{font-family:'Anton';font-size:22px;margin:0 0 9px;letter-spacing:.5px}
  .modal-card p{color:var(--txt);font-size:14.5px;line-height:1.55;margin:0 0 18px}
  .modal-card .btn{width:100%}
  @keyframes modalpop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}

  /* leaderboard */
  .lb-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:9px;
    display:flex;align-items:center;gap:12px}
  .lb-card .rk{font-family:'Anton';font-size:22px;width:34px;text-align:center;color:var(--mut)}
  .lb-card.r1 .rk{color:var(--gold)} .lb-card.r2 .rk{color:#cfd6e6} .lb-card.r3 .rk{color:#e0863b}
  .lb-card.r1{border-color:rgba(255,203,43,.5);background:linear-gradient(180deg,rgba(255,203,43,.08),var(--card))}
  /* temporary gold pulse on the top spot after saving picks */
  @keyframes topGlow{0%,100%{box-shadow:0 0 0 0 rgba(255,203,43,0)}50%{box-shadow:0 0 24px 3px rgba(255,203,43,.6)}}
  .lb-card.glow-top{animation:topGlow 1.1s ease-in-out 3}
  .lb-card .nm{font-weight:700;font-size:15px;flex:1;min-width:0;display:flex;align-items:center;gap:4px}
  .lb-card .sub{font-size:11px;color:var(--mut);font-weight:400}
  .paidbadge{font-size:9px;font-weight:800;letter-spacing:.5px;color:var(--gold);background:rgba(255,203,43,.14);
    border:1px solid rgba(255,203,43,.4);border-radius:20px;padding:2px 7px;vertical-align:middle;white-space:nowrap}
  .prizebadge{font-size:12px;font-weight:800;color:var(--green);background:rgba(34,197,94,.14);
    border:1px solid rgba(34,197,94,.4);border-radius:20px;padding:3px 9px;vertical-align:middle;white-space:nowrap;margin-left:8px}
  .lb-card .form{display:flex;gap:4px;margin-top:6px}
  .lb-card .fd{width:9px;height:9px;border-radius:50%}
  .lb-card .fd.f3{background:var(--green)} .lb-card .fd.f1{background:var(--gold)} .lb-card .fd.f0{background:var(--red)}
  .lb-card .tot{font-family:'Anton';font-size:26px;color:var(--green)}
  .lb-card .tot small{font-family:'Archivo';font-size:10px;color:var(--mut);display:block;text-align:right;font-weight:600}

  /* results entry */
  .r-note{font-size:12px;color:var(--mut);background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:10px 12px;margin-top:12px;line-height:1.5}

  /* bottom nav */
  nav{position:fixed;left:0;right:0;bottom:0;z-index:50;height:calc(60px + var(--safe-b));
    padding-bottom:var(--safe-b);background:rgba(8,12,24,.92);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);display:flex;max-width:560px;margin:0 auto}
  nav button{flex:1;background:none;border:none;color:var(--mut);font-family:'Archivo';font-weight:700;
    font-size:10.5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding-top:8px}
  nav button .ic{font-size:19px;line-height:1}
  nav button.on{color:var(--green)}

  .empty{text-align:center;color:var(--mut);padding:40px 20px;font-size:14px}
  .syncwarn{font-size:11px;color:var(--gold);background:rgba(255,203,43,.1);border:1px solid rgba(255,203,43,.3);
    border-radius:10px;padding:8px 10px;margin-top:10px;display:none}
  .hide{display:none!important}
  .filterbar{display:flex;gap:6px;overflow-x:auto;padding:4px 0 2px;margin-top:8px;-webkit-overflow-scrolling:touch}
  .filterbar button{flex:none;background:var(--card2);border:1px solid var(--line);color:var(--mut);
    border-radius:20px;padding:6px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Archivo'}
  .filterbar button.on{background:var(--cyan);color:#042029;border-color:var(--cyan)}

  /* knockout-only rule reminder pill */
  .m .meta .metaL{display:inline-flex;align-items:center}
  .minpill{font-size:9px;font-weight:800;letter-spacing:.5px;color:var(--gold);white-space:nowrap;
    background:rgba(255,203,43,.14);border:1px solid rgba(255,203,43,.4);border-radius:20px;padding:2px 7px;margin-left:7px}

  /* bonus prop cards (First Goal / Method of Victory) — styled like .m but kept off that
     class on purpose so they never get swept up by the generic match-card selectors/tests */
  .propcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:11px 12px;margin-bottom:10px}
  .propcard.locked,.propcard.scored{border-color:var(--line2)}
  .propcard.set{border-color:rgba(0,224,106,.4)}
  .propcard.set .stp .val{color:var(--green)}
  .propcard:not(.set):not(.scored) .stp .val{color:var(--mut)}
  .propcard .meta{display:flex;justify-content:space-between;font-size:10.5px;color:var(--mut);letter-spacing:.4px;margin-bottom:9px}
  .propcard .meta .metaL{display:inline-flex;align-items:center}
  .propcard .grp{color:var(--cyan);font-weight:700}
  .propq{font-size:13.5px;color:var(--txt);font-weight:600;margin:2px 0 10px;line-height:1.4}
  .propchoices{display:flex;gap:8px}
  .pchoice{flex:1;background:var(--card2);border:1px solid var(--line2);color:var(--txt);border-radius:12px;
    padding:12px 6px;font-size:12.5px;font-weight:800;cursor:pointer;font-family:'Archivo';text-align:center}
  .pchoice:active{transform:translateY(1px)}
  .pchoice.on{background:var(--green);color:#06210f;border-color:var(--green)}
  .pchoice[disabled]{opacity:.65;cursor:default}
</style>

<div class="wrap">
  <header>
    <div class="hd-row">
      <div class="badge">🏆</div>
      <div class="ttl"><b>PREDICTOR '26</b><span>World Cup &middot; 16 Top Games</span></div>
      <div class="who" id="whoBox"></div>
    </div>
    <div class="deadline" id="deadline"></div>
    <div class="syncwarn" id="syncwarn">⚠️ Backend not connected yet — nothing will save. Paste your Firebase config into the top of this file's code (setup steps are in the comment there).</div>
  </header>

  <main id="view"></main>
</div>

<div class="savebar hide" id="savebar">
  <div class="prog"><div class="prog-track"><div class="prog-fill" id="progFill"></div></div><span class="prog-txt" id="progTxt">0 / 10</span></div>
  <div class="inner">
    <button class="btn ghost" id="nextBtn" title="Jump to next unpicked game">Next ▸</button>
    <button class="btn" id="saveBtn">Save my predictions</button>
  </div>
</div>

<div class="saved-flash" id="flash">✓ Saved</div>

<div class="modal" id="modal"><div class="modal-card" id="modalCard"></div></div>

<nav>
  <button data-tab="predict" class="on"><span class="ic">⚽</span>Predict</button>
  <button data-tab="table"><span class="ic">🏅</span>Leaderboard</button>
  <button data-tab="picks"><span class="ic">👁</span>All Picks</button>
  <button data-tab="results"><span class="ic">📋</span>Results</button>
</nav>

<script type="module">
/* ============================================================
   BACKEND SETUP (one-time, ~10 min) — do this to make it save for real
   ------------------------------------------------------------
   1. Go to https://console.firebase.google.com → Add project (any name).
   2. Build → Firestore Database → Create database → Start in TEST mode → pick a region.
   3. Firestore → Rules tab → paste this, then Publish:
        rules_version = '2';
        service cloud.firestore {
          match /databases/{database}/documents {
            match /kv/{doc} { allow read, write: if true; }
          }
        }
   4. Project settings (gear icon) → "Your apps" → Web (</>) → register app →
      copy the firebaseConfig values into FIREBASE_CONFIG below.
   5. Deploy this file to GitHub Pages and share the link. Done.

   Note: these rules are open (fine for a private mates' league + the in-app PINs).
   Anyone with the URL could write if they tried hard. Ask me to lock it down
   with anonymous-auth rules if you ever want that.
   ============================================================ */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyB9Hz9eIA6FE66Yz0eSQG2awBlT5tl3yXU",
  authDomain: "world-cup-2026-5ecc3.firebaseapp.com",
  projectId: "world-cup-2026-5ecc3",
  storageBucket: "world-cup-2026-5ecc3.firebasestorage.app",
  messagingSenderId: "156621417462",
  appId: "1:156621417462:web:242c79cb284a954a8c75d7"
};

const CONFIGURED = FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.includes("PASTE");
let db=null;
const cache={};                       // originalKey -> value (string), kept live
const safeKey=k=>k.replace(/[^a-z0-9]/gi,"_");

async function initStore(){
  if(!CONFIGURED) return false;
  try{
    const app=initializeApp(FIREBASE_CONFIG);
    db=getFirestore(app);
    await new Promise((res)=>{
      let first=true;
      unsubKv=onSnapshot(collection(db,"kv"), s=>{
        storeReady=true;
        for(const k in cache) delete cache[k];
        s.forEach(d=>{const x=d.data(); if(x&&x.k!==undefined) cache[x.k]=x.v;});
        if(first){first=false;res();}
        else if(tab==="table"||tab==="picks") render();   // live refresh on others' saves
      }, err=>{console.error("Firestore:",err); if(first){first=false;res();}});
    });
    return storeReady;
  }catch(e){console.error(e);return false;}
}
/* ---------------- DATA ---------------- */

// followed by hand-picked knockout ties (3 Round-of-32, then quarter-finals). Knockout games are predicted on the
// 90-MINUTE score (draws still valid), so the normal 3/1/0 scoring applies unchanged.
// [id, group, dayLabel, ukTime, home, away, stage?, koISO?]
//   stage — "r32" marks a knockout tie (defaults to group). Drives the round label + filter.
//   koISO — the actual UK kickoff instant. KO picks lock KO_LEAD (2h) before kickoff; group
//           games omit it and lock at midnight UK of their matchday instead.

 // ["s1", "R32","Tue 14 Jul","8:00pm","TBD","TBD","sf",   "2026-07-14T19:00:00Z"],
 // ["s2", "R32","Wed 15 Jul","8:00pm","TBD","TBD","sf",   "2026-07-15T19:00:00Z"],

// Each pick stays editable until the START of its own matchday (UK), then locks.
const MONTHS={Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};
function dayLockTs(dayLabel){
  const p=dayLabel.trim().split(/\s+/);           // e.g. ["Thu","11","Jun"]
  const dd=String(parseInt(p[1],10)).padStart(2,"0");
  return new Date("2026-"+MONTHS[p[2]]+"-"+dd+"T00:00:00+01:00").getTime();  // midnight UK (BST) of matchday
}
const KO_LEAD = 2*60*60*1000;   // KO picks lock this long before kickoff (2 hours)
const MATCHES = RAW.map(r=>({id:r[0],grp:r[1],day:r[2],time:r[3],h:r[4],a:r[5],stage:r[6]||"group",
  hf:F[r[4]]||"🏳️",af:F[r[5]]||"🏳️",lockTs:r[7]?new Date(r[7]).getTime()-KO_LEAD:dayLockTs(r[2])}));
// A knockout tie is any non-group stage ("r32", "qf", …) — scored on the 90-min result,
// gets the "90 MIN RESULT" pill, and drives the login "new games" nudge.
const isKO = m => m.stage!=="group";
// Round/group chip + filter labels (knockouts read their round / "Knockouts").
const KO_LABELS = {r32:"ROUND OF 32", qf:"QUARTER-FINAL", sf:"SEMI-FINAL", final:"FINAL"};
const KO_SHORT  = {r32:"R32", qf:"QF", sf:"SF", final:"FIN"};
const stageLabel = m => isKO(m) ? (KO_LABELS[m.stage]||"KNOCKOUT") : "GROUP "+m.grp;
const gLabel = g => g==="R32" ? "Knockouts" : "Grp "+g;

// per-match locking — a pick locks once its matchday has begun
const matchLocked = m => Date.now() >= m.lockTs;
const openMatches = () => MATCHES.filter(m=>!matchLocked(m));
const nextLockTs  = () => MATCHES.reduce((a,m)=> (!matchLocked(m) && m.lockTs<a) ? m.lockTs : a, Infinity);

// Two bonus prop bets tied to the Final — separate from the score picks above. Each is worth
// +1 point: "pg" (first goal minute) to whoever's closest to the real minute (ties all score),
// "pm" (method of victory) to anyone who calls the right one of these three outcomes exactly.
const PROP_METHODS = ["Normal Time","Extra Time","Penalties"];
const PROPS = [
  {id:"pg", q:"⚽ What minute will the first goal be scored?"},
  {id:"pm", q:"🏆 How will the Final be decided?"},
];
const finalMatch = MATCHES.find(m=>m.stage==="final") || null;
const propsLockTs = finalMatch ? finalMatch.lockTs : Infinity;   // props lock alongside the Final
const propsLocked = () => Date.now() >= propsLockTs;

/* ---------------- STORAGE (Firestore-backed, live cache) ---------------- */
function nameKey(n){return (n||"").replace(/[^a-z0-9]/gi,"").toLowerCase();}
function slug(n){return "wc26:pred:"+nameKey(n);}
async function sGet(k){return cache[k]!==undefined?cache[k]:null;}
async function sSet(k,v){
  cache[k]=v;                                  // optimistic local update
  if(!db) return false;                        // no backend → not persisted to cloud
  try{await setDoc(doc(db,"kv",safeKey(k)),{k,v});return true;}
  catch(e){console.error(e);return false;}
}
async function sList(prefix){return Object.keys(cache).filter(k=>k.startsWith(prefix));}
function hash(p){let h=0;for(const c of (p||"")){h=(h*31+c.charCodeAt(0))>>>0;}return "h"+h;}
// Never let one bad/corrupt record throw — skip it and keep the app alive.
function safeParse(raw,fb){if(raw==null)return fb;try{const v=JSON.parse(raw);return (v&&typeof v==="object")?v:fb;}catch(e){console.warn("Skipped a corrupt record:",e&&e.message);return fb;}}
// Coerce every score to a clamped integer (0-20). Defends against junk data AND
// HTML/script injected into a score via the open database (stored-XSS protection).
function clampScore(n){n=Math.floor(Number(n));return Number.isFinite(n)?Math.max(0,Math.min(20,n)):0;}
function safeScores(obj){const out={};if(obj&&typeof obj==="object")for(const id in obj){const v=obj[id];if(v&&typeof v==="object")out[id]={h:clampScore(v.h),a:clampScore(v.a)};}return out;}
function safePicks(d){return safeScores(d&&d.picks);}
// Same defensive coercion as scores, for the two bonus props: pg (minute, 0-120) and pm (a fixed choice).
function clampMinute(n){n=Math.floor(Number(n));return Number.isFinite(n)?Math.max(0,Math.min(120,n)):null;}
function safeProps(obj){
  const out={pg:null,pm:null};
  if(obj&&typeof obj==="object"){
    if(obj.pg!=null){const v=clampMinute(obj.pg);if(v!=null)out.pg=v;}
    if(PROP_METHODS.includes(obj.pm))out.pm=obj.pm;
  }
  return out;
}

/* ---------------- HELPERS ---------------- */
function outcome(h,a){return h>a?1:(h<a?2:0);} // 1 home,2 away,0 draw
function scoreFor(pred,res){
  if(!pred||!res)return null;
  if(pred.h===res.h&&pred.a===res.a)return 3;
  if(outcome(pred.h,pred.a)===outcome(res.h,res.a))return 1;
  return 0;
}
// Prop points depend on the whole field (closest-minute is relative to everyone else's guess),
// so this takes a list of {n,props} rather than scoring one player in isolation like scoreFor.
// Returns {name: {pg: 0|1|null, pm: 0|1|null}} — null means that prop's result isn't in yet.
function computePropPoints(list){
  let best=Infinity;
  if(propResults.pg!=null){
    list.forEach(pl=>{const g=pl.props.pg;if(g!=null){const d=Math.abs(g-propResults.pg);if(d<best)best=d;}});
  }
  const out={};
  list.forEach(pl=>{
    const pg = propResults.pg==null ? null : ((pl.props.pg!=null && Math.abs(pl.props.pg-propResults.pg)===best)?1:0);
    const pm = propResults.pm==null ? null : (pl.props.pm===propResults.pm?1:0);
    out[pl.n]={pg,pm};
  });
  return out;
}
function initials(n){return n.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();}

  m.onclick=e=>{ if(e.target!==m) return; dismiss(); if(!btn2 && onClose) onClose(); };  // backdrop: single-button acts, two-button just closes
}

/* ---------------- RENDER: header bits ---------------- */
function nextLockLabel(){
  const m=openMatches().sort((a,b)=>a.lockTs-b.lockTs)[0];
  return m?m.day.replace(/^\w+\s/,""):"";   // "Thu 11 Jun" -> "11 Jun"
}
function renderHeader(){
  const dl=el("deadline");
  const open=openMatches().length, total=MATCHES.length;
  if(open===0){
    dl.className="deadline locked";
    dl.innerHTML='<span class="dot"></span><span>All predictions <b>LOCKED</b> — view only.</span>';
  }else if(open===total){
    dl.className="deadline";
    dl.innerHTML='<span class="dot"></span><span>Each pick locks on <b>its matchday</b> · first games lock <b>'+nextLockLabel()+'</b></span>';
  }else{
    dl.className="deadline";
    dl.innerHTML='<span class="dot"></span><span><b>'+(total-open)+'</b> locked · <b>'+open+'</b> open — next lock <b>'+nextLockLabel()+'</b></span>';
  }
  const wb=el("whoBox");
  if(player){
    wb.innerHTML='Playing as<b>'+player+'</b><u id="chg">🔒 lock</u>';
    el("chg").onclick=goNames;   // identity-locked: only ever re-prompts your own PIN
  }else wb.innerHTML='';
  const warn=el("syncwarn");
  if(!CONFIGURED){
    warn.textContent="⚠️ Backend not connected yet — nothing will save. Paste your Firebase config into the top of this file's code (setup steps are in the comment there).";
    warn.style.display="block";
  }else if(!storeReady){
    warn.textContent="⚠️ Can't reach the server right now — predictions won't be saved until the connection is back.";
    warn.style.display="block";
  }else warn.style.display="none";
}

/* ---------------- VIEW: name picker ---------------- */
function showConnError(){
  setSavebarVisible(false);setNav();renderHeader();
  view.innerHTML='<div class="panel"><h2>Can\'t reach the server</h2><p>Your predictions can\'t load or save right now. Check your internet connection and try again — your saved picks are safe.</p><button class="btn" id="retryBtn">Retry</button></div>';
  el("retryBtn").onclick=()=>location.reload();
}
async function goNames(){
  // Don't let a returning player into the setup flow on an empty cache — they could overwrite real picks.
  if(CONFIGURED && !storeReady){ showConnError(); return; }
  player=null;picks={};dirty=false;editId=null;tab="predict";
  setSavebarVisible(false);
  setNav();renderHeader();
  // Device locked to one identity once a PIN has been set here — no switching to someone else.
  const me=getMe();
  if(me){
    const raw=await sGet(slug(me));
    const data=raw?safeParse(raw,null):null;
    if(data && data.pin){ promptPin(me,data,true); }
    else { setupPin(me,true); }   // edge: bound name but record gone → re-set PIN, stays locked
    return;
  }
  view.innerHTML='<div class="panel"><h2>Who are you?</h2><p>Pick your name, set a 4-digit PIN, then make your predictions. Your PIN stops anyone else editing your picks — and this device stays signed in as you.</p><div class="names" id="names"></div></div>';
  const done = await whoHasSaved();
  const box=el("names");
  const paid = await loadPaid();
  PLAYERS.filter(n=>paid.includes(nameKey(n))).forEach(n=>{
    const b=document.createElement("button");
    b.className="name-btn"+(done.has(n)?" done":"");
    const tick = done.has(n)?'<span class="tick">✓ in</span>':'';
    b.innerHTML='<span class="ini">'+initials(n)+'</span>'+n+tick;
    b.onclick=()=>pickName(n);
    box.appendChild(b);
  });
}
async function whoHasSaved(){
  const keys=await sList("wc26:pred:");
  const set=new Set();
  for(const n of PLAYERS){if(keys.includes(slug(n)))set.add(n);}
  return set;
}

async function pickName(n){
  const raw=await sGet(slug(n));
  const data=raw?safeParse(raw,null):null;
  if(data && data.pin){ promptPin(n,data); }
  else { setupPin(n); }
}

function promptPin(n,data,locked){
  view.innerHTML='<div class="panel"><h2>Hi '+n.split(" ")[0]+' 👋</h2><p>Enter your 4-digit PIN to edit your predictions.</p>'
    +'<div class="pinrow" id="pinrow"></div><div class="err" id="pinerr"></div>'
    +'<button class="btn" id="pinok">Unlock</button>'
    +(locked?'':'<button class="btn ghost" id="pinback" style="margin-top:9px">Back</button>')+'</div>';
  buildPinInputs();
  if(!locked)el("pinback").onclick=goNames;
  el("pinok").onclick=()=>{
    const p=readPin();
    if(p.length<4){el("pinerr").textContent="Enter all 4 digits";return;}
    if(hash(p)!==data.pin){el("pinerr").textContent="Wrong PIN, try again";return;}
    setMe(n);player=n;picks=safePicks(data);propPicks=safeProps(data.props);dirty=false;enterPredict();
  };
}
function setupPin(n,locked){
  view.innerHTML='<div class="panel"><h2>Welcome, '+n.split(" ")[0]+'!</h2><p>Choose a 4-digit PIN. You\'ll need it to edit your picks later, so keep it safe. This device will stay signed in as you.</p>'
    +'<div class="pinrow" id="pinrow"></div><div class="err" id="pinerr"></div>'
    +'<button class="btn gold" id="pinok">Set PIN & start predicting</button>'
    +(locked?'':'<button class="btn ghost" id="pinback" style="margin-top:9px">Back</button>')+'</div>';
  buildPinInputs();
  if(!locked)el("pinback").onclick=goNames;
  el("pinok").onclick=async()=>{
    const p=readPin();
    if(p.length<4){el("pinerr").textContent="Pick a 4-digit PIN";return;}
    setMe(n);player=n;picks={};propPicks={pg:null,pm:null};dirty=false;
    const ok=await sSet(slug(n),JSON.stringify({pin:hash(p),picks:{},props:{pg:null,pm:null},updated:Date.now()}));
    if(!ok)flash("⚠️ Saved on this device only — check your connection");
    enterPredict();
  };
}
function buildPinInputs(){
  const r=el("pinrow");r.innerHTML="";
  for(let i=0;i<4;i++){
    const inp=document.createElement("input");
    inp.type="tel";inp.maxLength=1;inp.inputMode="numeric";inp.dataset.i=i;
    inp.oninput=e=>{e.target.value=e.target.value.replace(/\D/g,"");if(e.target.value&&i<3)r.children[i+1].focus();};
    inp.onkeydown=e=>{if(e.key==="Backspace"&&!e.target.value&&i>0)r.children[i-1].focus();};
    r.appendChild(inp);
  }
  setTimeout(()=>r.children[0].focus(),100);
}
function readPin(){return [...el("pinrow").children].map(i=>i.value).join("");}

function matchCard(m,hv,av,locked,res,pred){
  let ptsHtml="";
  if(res){
    const s=scoreFor(pred,res);
    const pill = s===3?'<span class="pill p3">+3 exact</span>':s===1?'<span class="pill p1">+1 result</span>':s===0?'<span class="pill p0">0 pts</span>':'';
    ptsHtml='<div class="pts"><span class="pill res">FT '+res.h+'–'+res.a+'</span>'+(pred?pill:'<span class="muted">no pick</span>')+'</div>';
  }
  const isSet=!!pred;
  const editable=!locked && !res;
  const editing=(editId===m.id);
  const collapsed=isSet && editable && !editing;   // picked & not being edited → read-only score + Edit

  let metaRight;
  if(res) metaRight=m.time+' UK';
  else if(locked) metaRight=isSet?'🔒 locked':'🔒 no pick';
  else if(collapsed) metaRight='<button class="editbtn" data-edit="'+m.id+'">✎ Edit</button>';
  else if(isSet) metaRight='<span class="picked">✓ picked</span>';
  else metaRight=m.time+' UK';

  const showSteppers = editable && (!isSet || editing);
  // per-team control: steppers when editing, "no pick" when locked & unpicked, else a read-only value
  const ctrl=(side,v)=> showSteppers ? stepper(side,v)
    : (!isSet && !editable) ? '<span class="nopick">–</span>'
    : staticVal(v);

  const koPill = isKO(m) ? '<span class="minpill">90 MIN RESULT</span>' : '';
  return '<div class="m'+(locked?' locked':'')+(res?' scored':'')+(isSet?' set':'')+(collapsed?' done':'')+'" data-id="'+m.id+'">'
    +'<div class="meta"><span class="metaL"><span class="grp">'+stageLabel(m)+'</span>'+koPill+'</span><span>'+metaRight+'</span></div>'
    +'<div class="teams">'
      +'<div class="trow"><span class="fl">'+m.hf+'</span><span class="nm">'+m.h+'</span>'+ctrl("h",hv)+'</div>'
      +'<div class="trow"><span class="fl">'+m.af+'</span><span class="nm">'+m.a+'</span>'+ctrl("a",av)+'</div>'
    +'</div>'+ptsHtml+'</div>';
}
function staticVal(v){return '<span class="sval">'+v+'</span>';}
function stepper(side,val){
  return '<div class="stp" data-side="'+side+'">'
    +'<button data-d="-1" aria-label="minus">−</button>'
    +'<span class="val">'+val+'</span>'
    +'<button data-d="1" aria-label="plus">+</button></div>';
}
function wireSteppers(){
  view.querySelectorAll(".m:not(.locked)").forEach(card=>{
    const id=card.dataset.id;
    card.querySelectorAll(".stp").forEach(stp=>{
      const side=stp.dataset.side;
      stp.querySelectorAll("button").forEach(btn=>{
        btn.onclick=()=>{
          if(!picks[id])picks[id]={h:0,a:0};   // any tap registers the pick — even a deliberate 0-0
          let v=picks[id][side]+(+btn.dataset.d);
          v=Math.max(0,Math.min(20,v));
          picks[id][side]=v;
          stp.querySelector(".val").textContent=v;
          editId=id;                            // keep this card open while it's being dialed in
          if(!card.classList.contains("set")){
            card.classList.add("set");
            const mr=card.querySelector(".meta span:last-child");
            if(mr)mr.innerHTML='<span class="picked">✓ picked</span>';
          }
          dirty=true;
          syncSavebar();                        // unsaved change → bring the Save bar back
          updateProgress();
        };
      });
    });
  });
}

/* ---------------- VIEW: leaderboard ---------------- */
async function renderTable(){
  setSavebarVisible(false);
  view.innerHTML='<div class="empty">Loading standings…</div>';
  await loadResults();
  const keys=await sList("wc26:pred:");
  const entries=[];
  for(const n of PLAYERS){
    if(!keys.includes(slug(n)))continue;
    const raw=await sGet(slug(n));if(!raw)continue;
    const d=safeParse(raw,null);if(!d)continue;
    entries.push({n,dp:safePicks(d),dprops:safeProps(d.props)});
  }
  const propPts=computePropPoints(entries.map(e=>({n:e.n,props:e.dprops})));
  const rows=[];
  for(const {n,dp,dprops} of entries){
    let tot=0,exact=0,correct=0,played=0;const form=[];
    for(const m of MATCHES){
      const s=scoreFor(dp[m.id],results[m.id]);
      if(s===null)continue;
      played++;tot+=s;if(s===3)exact++;else if(s===1)correct++;
      form.push(s);                                 // chronological run of scored games
    }
    const bonus=(propPts[n].pg||0)+(propPts[n].pm||0);
    tot+=bonus;
    rows.push({n,tot,exact,correct,played,made:Object.keys(dp).length,form,bonus});
  }
  const anyResults=Object.keys(results).length>0;
  // Until points exist, it's just an alphabetical roster; once results come in, rank by points.
  rows.sort(anyResults
    ? (a,b)=> b.tot-a.tot || b.exact-a.exact || a.n.localeCompare(b.n)
    : (a,b)=> a.n.localeCompare(b.n));

  if(rows.length===0){view.innerHTML='<div class="empty">No predictions submitted yet.<br>Be the first — tap <b>Predict</b>.</div>';return;}
  let h='';
  if(!anyResults){
    h+='<div class="r-note" style="margin-bottom:14px">No results entered yet, so everyone\'s on 0. The table updates automatically as match results are added in the <b>Results</b> tab. Below shows who\'s submitted picks.</div>';
  }
  let rank=0,prev=null;
  rows.forEach((r,i)=>{
    if(r.tot!==prev){rank=i+1;prev=r.tot;}
    const cls=anyResults&&rank<=2?" r"+rank:"";
    const medal=!anyResults?"·":(rank===1?"🥇":rank===2?"🥈":"");
    const prize=rank===1?'<span class="prizebadge">£72</span>':rank===2?'<span class="prizebadge">£18</span>':"";
    const divider=anyResults&&rank===3?'<div style="height:1px;border-top:1px dotted var(--line1);margin:8px 0;opacity:.5"></div>':"";
    const formHtml=(anyResults&&r.form.length)
      ? '<div class="form">'+r.form.slice(-8).map(s=>'<span class="fd '+(s===3?'f3':s===1?'f1':'f0')+'" title="'+(s===3?'+3 exact':s===1?'+1 result':'0 pts')+'"></span>').join('')+'</div>'
      : '';
    h+=divider+'<div class="lb-card'+cls+'">'
      +'<div class="rk">'+medal+'</div>'
      +'<div class="nm">'+r.n+prize+'<span class="sub" style="display:block">'+(anyResults?(r.exact+' exact · '+r.correct+' result · '+r.played+' scored'+(r.bonus?' · +'+r.bonus+' bonus':'')):(r.made+' / '+MATCHES.length+' picks made'))+'</span>'+formHtml+'</div>'
      +'<div class="tot">'+r.tot+'<small>POINTS</small></div></div>';
  });
  view.innerHTML=h;
  // Just came from saving picks → jump to the top of the table and pulse the #1 spot.
  if(glowTop){
    glowTop=false;
    window.scrollTo(0,0);                              // anchor to the top of the table
    const top=view.querySelector('.lb-card');
    if(top){ top.classList.add("glow-top"); setTimeout(()=>top.classList.remove("glow-top"),3600); }
  }
}

// Reveal block for the two bonus props, matching the .pk reveal pattern above but kept as a
// separate .propreveal class so it isn't swept into any "count the .pk cards" assertions.
function propRevealHtml(all,locked,day,propPts){
  const dayShort=day.replace(/^\w+\s/,"");
  const hiddenRow='<div class="pr"><span class="miss">🔒 Picks hidden until matchday ('+dayShort+')</span></div>';
  let h='<div class="propreveal"><div class="top"><span class="grp">BONUS</span><span class="nm">⚽ First Goal Minute</span>'
    +(propResults.pg!=null?'<span class="sc">'+propResults.pg+"'</span>":'<span class="sc tbd">TBD</span>')
    +'</div><div class="plist">';
  if(!locked){ h+=hiddenRow; }
  else{
    all.forEach(pl=>{
      const g=pl.props.pg;
      if(g==null){h+='<div class="pr"><span class="pn">'+pl.n+'</span><span class="miss">— no pick</span></div>';return;}
      const pts=propPts[pl.n].pg;
      const pp=pts==null?'':'<span class="pp '+(pts?'p3':'p0')+'">+'+pts+'</span>';
      h+='<div class="pr"><span class="pn">'+pl.n+'</span><span class="pv">'+g+"'</span>"+pp+'</div>';
    });
  }
  h+='</div></div>';
  h+='<div class="propreveal"><div class="top"><span class="grp">BONUS</span><span class="nm">🏆 Method of Victory</span>'
    +(propResults.pm!=null?'<span class="sc">'+propResults.pm+'</span>':'<span class="sc tbd">TBD</span>')
    +'</div><div class="plist">';
  if(!locked){ h+=hiddenRow; }
  else{
    all.forEach(pl=>{
      const g=pl.props.pm;
      if(g==null){h+='<div class="pr"><span class="pn">'+pl.n+'</span><span class="miss">— no pick</span></div>';return;}
      const pts=propPts[pl.n].pm;
      const pp=pts==null?'':'<span class="pp '+(pts?'p3':'p0')+'">+'+pts+'</span>';
      h+='<div class="pr"><span class="pn">'+pl.n+'</span><span class="pv" style="font-size:13px">'+g+'</span>'+pp+'</div>';
    });
  }
  h+='</div></div>';
  return h;
}
// The group's most popular scoreline for a game.
function crowdFav(m,all){
  const tally={};let pickers=0;
  all.forEach(pl=>{const p=pl.picks[m.id];if(p){pickers++;const k=p.h+'–'+p.a;tally[k]=(tally[k]||0)+1;}});
  let topK=null,topN=0;
  for(const k in tally){ if(tally[k]>topN){topN=tally[k];topK=k;} }
  if(!topK) return '';
  return '<div class="crowd">👑 Most tipped <b>'+topK+'</b> · '+topN+' of '+pickers+'</div>';
}
async function loadAllPicks(){
  const keys=await sList("wc26:pred:");
  const out=[];
  for(const n of PLAYERS){
    if(!keys.includes(slug(n)))continue;
    const raw=await sGet(slug(n));if(!raw)continue;
    const d=safeParse(raw,null);if(!d)continue;
    out.push({n,picks:safePicks(d),props:safeProps(d.props)});
  }
  return out;
}

});
function onSaveClick(){
  if(!player)return;
  const left=openMatches().filter(m=>!picks[m.id]).length;   // still-open games with no prediction
  if(left>0){
    showModal({
      ico:'📝', title:'Not finished yet',
      body:"You haven't predicted all the games — <b>"+left+"</b> still to go. Finish them now, or save these and come back any time before they lock.",
      btn:'Continue and do it now', onClose:()=>jumpToNext(false),
      btn2:"I'll do it later — save these", onBtn2:saveMine
    });
    return;
  }
  saveMine();
}
el("saveBtn").onclick=onSaveClick;
el("nextBtn").onclick=()=>jumpToNext(false);
